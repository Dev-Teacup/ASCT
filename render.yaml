version: "1"

services:
  - type: web
    name: asct
    runtime: docker
    repo: https://github.com/Dev-Teacup/ASCT
    branch: main
    region: virginia
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health.php
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 4000
      - key: DB_NAME
        value: asct
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_CHARSET
        value: utf8mb4
      - key: DB_SSL_MODE
        value: required
      - key: DB_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: DB_SSL_VERIFY_SERVER_CERT
        value: "true"
      - key: ASCT_APP_NAME
        value: ASCT Portal
      - key: ASCT_APP_BASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        value: ASCT Portal
